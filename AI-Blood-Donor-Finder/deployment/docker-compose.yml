# ===== BLOODFINDER AI - DOCKER COMPOSE =====
# Multi-service deployment configuration

version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/bloodfinder
      - JWT_SECRET=${JWT_SECRET:-bloodfinder_jwt_secret_key_2024}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  # MongoDB Database
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/public:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  # AI Model Server (Python)
  ai-model:
    build:
      context: .
      dockerfile: Dockerfile.ai
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=production
    volumes:
      - ./backend/AI:/app/AI
    restart: unless-stopped

volumes:
  mongo-data:
